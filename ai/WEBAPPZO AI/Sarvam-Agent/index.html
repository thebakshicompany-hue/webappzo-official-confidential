<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURAJ | General Assistant by WebAppzo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <h2>SURAJ</h2>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <i class="fa-solid fa-plus"></i> New Conversation
            </button>

            <div class="sidebar-info">
                <p class="tagline">The <span>WebAppzo</span> Ecosystem</p>
                <div class="status">
                    <span class="dot"></span> Online
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="model-info">
                    <h3>SURAJ</h3>
                    <p>General Purpose Assistant</p>
                </div>
                <div class="actions">
                    <button id="clearBtn" title="Clear Chat"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </header>

            <div class="chat-box" id="chatBox">
                <!-- Welcome Message -->
                <div class="message assistant">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">
                        <p>Hello! I am SURAJ, your intelligent general assistant created by WebAppzo. How can I help you
                            build something great today?</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="chatForm">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="Message SURAJ..." rows="1" autofocus></textarea>
                        <button type="submit" id="sendBtn" title="Send (Enter)">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
                <p class="disclaimer">SURAJ can make mistakes. Consider verifying important information.</p>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
